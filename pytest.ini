[pytest]
pythonpath = .
# test_*.py 이름이지만 실제로는 `python 파일.py`로 직접 실행하는 콘솔 스크립트.
# pytest가 수집하면 import 단계에서 graph.py의 ChatOpenAI 초기화가 돌아
# CI(OPENAI_API_KEY 미주입)에서 collection 에러가 난다 → 수집 제외.
addopts = --ignore=test_multi_docs_persona.py --ignore=test_api_client.py
norecursedirs = seeds seeds_excluded data_임시 uploads
